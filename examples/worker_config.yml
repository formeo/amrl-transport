# AMRL Worker Configuration
# Copy this file and adjust for your lab setup.

worker_id: "lab-stm-01"
log_level: "INFO"

transport:
  # Options: createc, nanonis, simulator
  type: simulator

  createc:
    dispatch_mode: "Dispatch"   # or "DispatchEx"

  nanonis:
    host: "localhost"
    port: 6501

  simulator:
    lattice_constant: 0.288     # Ag(111)
    noise_level: 0.03
    manipulation_success_rate: 0.7
    seed: null                  # null = random
    initial_atoms:
      - [0.0, 0.0]
      - [1.5, 0.0]
      - [0.75, 1.3]

queue:
  broker_url: "amqp://amrl:amrl@localhost:5672/"
  result_backend: "redis://localhost:6379/0"
  queue_name: "amrl.tasks"
  prefetch_count: 1
  heartbeat: 60
